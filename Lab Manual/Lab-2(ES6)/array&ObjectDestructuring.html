<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>array&ObjectDestructuring</title>
</head>
<body>
    <script>
        array=['meet','pipaliya','jetpur']
        object = {
            name : 'meet',
            surname : 'pipaliya',
            city : 'jetpur'
        }
        const [name ,surname ,city] =array
        console.log("name = "+name+" surname = "+surname+" city = "+city)
        console.log("name = "+object.name+" surname = "+object.surname+" city = "+object.city)

    </script>
</body>
</html>
